<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#EBBEC4" rx="14"/>

  <!-- Infinity symbol — two lobes meeting/crossing at center (100,88) -->
  <path
    d="M100,88
       C96,74 78,62 62,62
       C46,62 40,74 40,88
       C40,102 46,114 62,114
       C78,114 96,102 100,88
       C104,74 122,62 138,62
       C154,62 160,74 160,88
       C160,102 154,114 138,114
       C122,114 104,102 100,88 Z"
    fill="none"
    stroke="#B8893A"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- INFINITY -->
  <text
    x="100" y="140"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="700"
    font-size="21"
    fill="#1A1010"
    letter-spacing="6"
  >INFINITY</text>

  <!-- Subtitle -->
  <text
    x="100" y="157"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="6.2"
    fill="#1A1010"
    letter-spacing="1.6"
  >ESTÉTICA E TRICOLOGIA AVANÇADA</text>
</svg>
